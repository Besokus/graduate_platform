spring:
  datasource:
    url: jdbc:h2:mem:graduate_platform_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER,YEAR
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  mail:
    host: localhost
    port: 2525
    username: test
    password: test

app:
  jwt:
    secret: graduate-platform-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 86400000
